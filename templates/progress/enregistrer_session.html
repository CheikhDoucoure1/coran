{% extends 'base.html' %}
{% block title %}Évaluer une Récitation - Coran Sénégal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h2 class="fw-bold mb-4"><i class="bi bi-mic me-2 text-success"></i>Évaluer une Récitation</h2>
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Classe <span class="text-danger">*</span></label>
              <select name="classe_id" class="form-select" id="select-classe">
                <option value="">-- Choisir une classe --</option>
                {% for classe in classes %}
                <option value="{{ classe.pk }}">{{ classe.nom }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Élève <span class="text-danger">*</span></label>
              <select name="eleve" class="form-select" required id="select-eleve">
                <option value="">-- Choisir un élève --</option>
                {% for classe in classes %}
                {% for eleve in classe.eleves.all %}
                <option value="{{ eleve.pk }}" data-classe="{{ classe.pk }}">{{ eleve.get_full_name|default:eleve.username }}</option>
                {% endfor %}
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Sourate <span class="text-danger">*</span></label>
              <select name="surah" class="form-select" required>
                <option value="">-- Choisir --</option>
                {% for s in sourates %}
                <option value="{{ s.pk }}">{{ s.numero }}. {{ s.nom_translittere }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Note /20 <span class="text-danger">*</span></label>
              <input type="number" name="note" class="form-control" min="0" max="20" step="0.5" required placeholder="Ex: 15">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Versets mémorisés</label>
              <input type="number" name="versets_memorises" class="form-control" min="0" value="0" placeholder="0">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Évaluation qualitative</label>
              <select name="evaluation_qualitative" class="form-select">
                <option value="excellent">Excellent</option>
                <option value="bien">Bien</option>
                <option value="satisfaisant" selected>Satisfaisant</option>
                <option value="a_revoir">À revoir</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Critères de Tajweed</label>
              <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="tajweed_respecte" id="tajweed">
                  <label class="form-check-label" for="tajweed">Tajweed respecté</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="makhraj_correct" id="makhraj">
                  <label class="form-check-label" for="makhraj">Makhraj correct</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="rythme_adequat" id="rythme">
                  <label class="form-check-label" for="rythme">Rythme adéquat</label>
                </div>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Observations</label>
              <textarea name="observations" class="form-control" rows="3" placeholder="Commentaires sur la récitation..."></textarea>
            </div>
          </div>
          <div class="d-flex gap-3 justify-content-end mt-4">
            <a href="{% url 'tableau_de_bord' %}" class="btn btn-outline-secondary">Annuler</a>
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-save me-2"></i>Enregistrer l'Évaluation
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('select-classe').addEventListener('change', function() {
  const classeId = this.value;
  const eleveSelect = document.getElementById('select-eleve');
  Array.from(eleveSelect.options).forEach(opt => {
    if (!opt.value) return;
    opt.hidden = classeId ? opt.dataset.classe !== classeId : false;
  });
  eleveSelect.value = '';
});
</script>
{% endblock %}
