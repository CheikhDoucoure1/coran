{% extends 'base.html' %}
{% block title %}Mon Profil - Coran Sénégal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h2 class="fw-bold mb-4"><i class="bi bi-person-circle me-2 text-success"></i>Mon Profil</h2>
    <div class="card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          {% if user.photo %}
          <img src="{{ user.photo.url }}" class="rounded-circle mb-2" width="80" height="80" style="object-fit:cover;">
          {% else %}
          <div class="rounded-circle bg-success d-inline-flex align-items-center justify-content-center mb-2" style="width:80px;height:80px;">
            <i class="bi bi-person text-white fs-2"></i>
          </div>
          {% endif %}
          <p class="mb-0 fw-bold">{{ user.get_full_name|default:user.username }}</p>
          <span class="badge bg-success">{{ user.get_role_display }}</span>
        </div>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Prénom</label>
              <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Nom</label>
              <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Email</label>
              <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Téléphone</label>
              <input type="text" name="telephone" class="form-control" value="{{ user.telephone }}" placeholder="77 XXX XX XX">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Photo de profil</label>
              <input type="file" name="photo" class="form-control" accept="image/*">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-4">
            <i class="bi bi-save me-2"></i>Enregistrer les modifications
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
